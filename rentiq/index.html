<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rentiq - Soluciones de Alquiler</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Rentiq</h1>
    </header>
    <main>
        <form action=""></form>
        <section>
            <h2>Crea tu cuenta</h2>
            <p>Únete a la comunidad de gestión inmobiliaria inteligente</p>
        </section>
        <section>
            <fieldset>
                <label for="name">NOMBRE COMPLETO</label>
                <input class="redondo" type="text" id="name" />
            </fieldset>
            <fieldset>
            <label for="email">CORREO ELECTRONICO</label>
            <input class="redondo" type="email" id="email" />
          </fieldset>
          <fieldset>
            <label for="pass">CONTRASEÑA</label>
            <input class="redondo" type="password" id="pass" />
          </fieldset>
          <fieldset>
            <label for="confirm-pass">CONFIRMAR CONTRASEÑA</label>
            <input class="redondo" type="password" id="confirm-pass" />
          </fieldset>
        </section>
        <button>Registrarse</button>
        <footer>
            <p>¿Ya tienes cuenta? <a href="">Inicia sesión</a></p>
        </footer>
          
        
    </main>

</body>
</html>

<!doctype html>
<html lang="e">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rentiq-Inicio de sesión</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
      <h1>Rentiq</h1>
    </header>
    <main>
      <form action="">
        <section>
          <h2>Bienvenido de nuevo</h2>
          <p>Ingresa tus credenciales para gestionar tus propiedades</p>
        </section>
        <section>
          <fieldset>
            <label for="email">CORREO ELECTRONICO</label>
            <input class="redondo" type="email" id="email" />
          </fieldset>
          <fieldset>
            <label for="pass">CONTRASEÑA</label>
            <input type="password" id="pass" />
            <a href="">¿Olvidaste tu contraseña?</a>
          </fieldset>
        </section>
        <footer>
            <button>Ingresar</button>
        </footer>
      </form>
    </main>
    <footer></footer>
  </body>
</html>
